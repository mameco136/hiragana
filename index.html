<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ひらがなアドベンチャー 🌈</title>
  <style>
    :root {
      --pink:#FF6B9D; --yellow:#FBBF24; --green:#22C55E;
      --blue:#38BDF8; --purple:#A855F7; --red:#EF4444;
      --orange:#F97316; --bg1:#FFFBEB; --bg2:#ECFDF5;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI','Helvetica Neue',sans-serif;
      background:linear-gradient(145deg,var(--bg1) 0%,var(--bg2) 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .screen{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      width:100%;max-width:560px;min-height:100vh;
      padding:20px 16px 30px;text-align:center;animation:fadeInUp .4s ease-out;
    }
    .screen.active{display:flex}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* ── Characters ── */
    .chars{display:flex;gap:10px;justify-content:center;margin:8px 0;align-items:flex-end}
    .char-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
    .char-label{font-size:9px;color:#aaa;letter-spacing:.5px}
    .bubble{
      background:white;border-radius:12px;padding:5px 10px;font-size:.75em;
      color:#555;box-shadow:0 2px 8px rgba(0,0,0,.1);
      position:relative;max-width:115px;line-height:1.3;margin-bottom:4px;
    }
    .bubble::after{
      content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
      border:5px solid transparent;border-top-color:white;
    }

    /* ── Animations ── */
    @keyframes idle  {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes bounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-26px) scale(1.1)}60%{transform:translateY(-18px) scale(1.05)}}
    @keyframes shake {0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-6deg)}40%{transform:translateX(10px) rotate(6deg)}60%{transform:translateX(-7px)}80%{transform:translateX(7px) rotate(4deg)}}
    @keyframes cheer {0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-14deg) scale(1.08)}75%{transform:rotate(14deg) scale(1.08)}}
    @keyframes sparkle{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(.3)}}
    @keyframes stampIn{0%{transform:scale(2) rotate(-15deg);opacity:0}60%{transform:scale(.9) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}

    .c{display:block;animation:idle 2.4s ease-in-out infinite}
    .c.bounce{animation:bounce .55s ease-in-out 3}
    .c.shake {animation:shake  .5s  ease-in-out 2}
    .c.cheer {animation:cheer  .4s  ease-in-out infinite}

    /* ── Buttons ── */
    .btn{
      display:inline-block;border:none;cursor:pointer;font-weight:700;
      padding:13px 28px;border-radius:50px;font-size:1.05em;
      box-shadow:0 4px 0 rgba(0,0,0,.18);transition:all .15s;margin:6px;
    }
    .btn:hover {transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.18)}
    .btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.18)}
    .btn-green {background:var(--green); color:#fff}
    .btn-yellow{background:var(--yellow);color:#fff}
    .btn-pink  {background:var(--pink);  color:#fff}
    .btn-purple{background:var(--purple);color:#fff}
    .btn-grey  {background:#e5e7eb;color:#444}

    /* ── Title ── */
    #s-title h1{font-size:2.6em;color:var(--orange);text-shadow:3px 3px 0 rgba(249,115,22,.2);line-height:1.1}
    #s-title h2{font-size:1.2em;color:var(--green);margin-bottom:4px}

    /* ── Top bar ── */
    .top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:8px}
    .back-btn{
      background:#f3f4f6;border:none;border-radius:50%;width:36px;height:36px;
      font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .badge{
      background:linear-gradient(135deg,var(--yellow),var(--orange));
      color:white;border-radius:20px;padding:5px 16px;font-size:.85em;font-weight:700;
    }

    /* ── Progress ── */
    .prog-wrap{width:100%;margin-bottom:8px}
    .prog-meta{display:flex;justify-content:space-between;font-size:.8em;color:#888;margin-bottom:4px}
    .prog-bar {height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden}
    .prog-fill{height:100%;border-radius:5px;transition:width .5s ease;background:linear-gradient(90deg,var(--yellow),var(--green))}

    /* ── Hiragana card ── */
    .hira-card{
      background:white;border-radius:28px;padding:18px 24px 14px;
      box-shadow:0 8px 30px rgba(0,0,0,.1);margin:6px 0;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      min-width:280px;
    }
    .hira-big{
      font-size:5.5em;
      font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',serif;
      color:#2d2d44;line-height:1;
    }
    .hira-illust{font-size:3.8em;line-height:1;animation:stampIn .4s ease-out}
    .hira-word{font-size:.95em;color:#aaa;font-weight:700;letter-spacing:1.5px;margin-top:2px}

    /* ── Score row ── */
    .score-row{display:flex;gap:12px;margin:4px 0}
    .score-pill{background:white;border-radius:20px;padding:5px 14px;font-size:.85em;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .ok{color:var(--green);font-weight:700}
    .ng{color:var(--red);  font-weight:700}

    /* ── Choices ── */
    .choices{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      width:100%;max-width:380px;margin:8px 0;
    }
    .choice{
      background:white;border:3px solid #e5e7eb;border-radius:16px;
      padding:14px 8px;font-size:1.5em;font-weight:700;cursor:pointer;
      transition:all .18s;color:#222;
      font-family:'Segoe UI','Helvetica Neue',sans-serif;letter-spacing:1px;
    }
    .choice:hover:not(:disabled){border-color:var(--yellow);background:#FFFBEB;transform:scale(1.05)}
    .choice.correct{background:#DCFCE7;border-color:var(--green);color:#166534}
    .choice.wrong  {background:#FEE2E2;border-color:var(--red);  color:#991B1B}
    .choice:disabled{cursor:default}

    /* ── Feedback ── */
    #feedback{
      position:fixed;inset:0;pointer-events:none;z-index:200;
      display:flex;align-items:center;justify-content:center;
    }
    .fb-text{font-size:3.2em;font-weight:900;display:none;animation:fbAnim 1.1s forwards}
    @keyframes fbAnim{
      0%{opacity:0;transform:scale(.5)} 20%{opacity:1;transform:scale(1.2)}
      70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(.8) translateY(-20px)}
    }
    .fb-ok{color:var(--green)}
    .fb-ng{color:var(--red)}
    .spark{position:fixed;pointer-events:none;z-index:300;font-size:1.4em;animation:sparkle .9s forwards}

    /* ── Result ── */
    .result-circle{
      width:140px;height:140px;border-radius:50%;
      background:linear-gradient(135deg,var(--yellow),var(--green));
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      box-shadow:0 8px 24px rgba(251,191,36,.4);margin:12px auto;
    }
    .rn{font-size:3em;font-weight:900;color:white;line-height:1}
    .rt{font-size:1em;color:rgba(255,255,255,.8)}
    .result-msg{font-size:1.05em;color:#555;margin:8px 0 12px;max-width:300px;line-height:1.5}

    .stitle{font-size:1.6em;font-weight:800;color:#2d2d44;margin-bottom:4px}

    /* ── Missed list ── */
    .miss-list{
      background:white;border-radius:18px;padding:12px 16px;
      width:100%;max-width:380px;margin:8px 0;
      box-shadow:0 3px 12px rgba(0,0,0,.07);text-align:left;
    }
    .miss-list h3{font-size:.8em;color:#bbb;margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}
    .miss-item{
      display:flex;align-items:center;gap:10px;
      padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:.95em;
    }
    .miss-item:last-child{border-bottom:none}
    .miss-h{font-size:1.8em;min-width:38px;font-family:serif}
    .miss-emoji{font-size:1.4em}
    .miss-r{color:var(--orange);font-weight:700}
    .miss-w{color:#888;font-size:.85em}

    /* ── Fullscreen ── */
    #fs-btn{
      position:fixed;top:10px;right:12px;z-index:500;
      background:rgba(255,255,255,.75);border:none;border-radius:10px;
      font-size:1.3em;width:38px;height:38px;cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.12);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;transition:all .15s;
    }
    #fs-btn:hover{background:white;transform:scale(1.1)}

    /* ── Stars bg ── */
    .star-bg{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
    .sd{position:absolute;font-size:1.3em;opacity:.1}

    @media(max-width:420px){
      .hira-big{font-size:4em}
      .choice{font-size:1.2em;padding:12px 4px}
    }
  </style>
</head>
<body>

<button id="fs-btn" onclick="toggleFS()" title="全画面">⛶</button>
<div class="star-bg" id="starBg"></div>

<div id="feedback">

<!-- ═══ SCREEN 2: GAME ═══ -->

<script>
// ── ひらがな データベース ───────────────────────────────────────────────────────
const DB = [
  {h:'あ', r:'a',   word:'アヒル',       emoji:'🦆'},

  {h:'た', r:'ta',  word:'タコ',         emoji:'🐙'},
  {h:'ち', r:'chi', word:'チョウチョ',   emoji:'🦋'},
  {h:'つ', r:'tsu', word:'ツキ',         emoji:'🌙'},
  {h:'て', r:'te',  word:'テントウムシ', emoji:'🐞'},

// ── State ─────────────────────────────────────────────────────────────────────
let state = { questions:[], current:0, correct:0, wrong:0, missed:[] };

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function confirmQuit(){ if(confirm('やめる？')) goTo('s-title'); }

// ── Shuffle ───────────────────────────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame(){
  state.questions = shuffle(DB).slice(0, 10);
  state.current = 0; state.correct = 0; state.wrong = 0; state.missed = [];
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('wrong-count').textContent   = '0';
  goTo('s-game');
  renderQuestion();
}

// ── Render Question ───────────────────────────────────────────────────────────
function renderQuestion(){
  const q     = state.questions[state.current];
  const total = state.questions.length;
  const idx   = state.current;

  document.getElementById('q-counter').textContent   = `もんだい ${idx+1} / ${total}`;
  document.getElementById('q-score-top').textContent  = `⭐ ${state.correct}`;
  document.getElementById('prog-fill').style.width    = (idx/total*100) + '%';

  document.getElementById('hira-display').textContent = q.h;
  document.getElementById('hira-illust').textContent  = q.emoji;
  document.getElementById('hira-word').textContent    = q.word;

  // 吹き出し
  const bubbles = ['がんばって！','よめるかな？','できるよ！','すごいね！','いっしょに！'];
  document.getElementById('game-bubble').textContent =
    bubbles[Math.floor(Math.random()*bubbles.length)];

  // 選択肢：正解1 + 不正解3
  const wrongSet = [...new Set(DB.map(x=>x.r))].filter(r=>r!==q.r);
  const opts     = shuffle([q.r, ...shuffle(wrongSet).slice(0,3)]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  opts.forEach(o=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.dataset.reading = o;
    btn.textContent = o;
    btn.onclick = ()=>checkAnswer(o, q.r, btn);
    grid.appendChild(btn);
  });

  setCharAnim(['c-chiikawa-g'], 'idle');
}

// ── Check Answer ──────────────────────────────────────────────────────────────
function checkAnswer(chosen, correct, btn){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const isOk = chosen === correct;

  if(isOk){
    btn.classList.add('correct');
    state.correct++;
    document.getElementById('correct-count').textContent = state.correct;
    showFeedback(true); playCorrect();
    setCharAnim(['c-chiikawa-g'], 'bounce');
    launchSparks(btn);
  } else {
    btn.classList.add('wrong');
    state.wrong++;
    document.getElementById('wrong-count').textContent = state.wrong;
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.dataset.reading===correct) b.classList.add('correct');
    });
    showFeedback(false); playWrong();
    setCharAnim(['c-chiikawa-g'], 'shake');
    state.missed.push(state.questions[state.current]);
  }

  setTimeout(()=>{
    state.current++;
    if(state.current < state.questions.length) renderQuestion();
    else showResults();
  }, 1500);
}

// ── Feedback ──────────────────────────────────────────────────────────────────
function showFeedback(ok){
  const el = document.getElementById(ok?'fbOk':'fbNg');
  el.style.display='block'; el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='fbAnim 1.1s forwards';
  setTimeout(()=>{ el.style.display='none'; }, 1200);
}

function launchSparks(btn){
  const emojis=['⭐','✨','🌈','💖','🎉','🌟'];
  const rect=btn.getBoundingClientRect();
  for(let i=0;i<6;i++){
    const s=document.createElement('span');
    s.className='spark';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=(rect.left+rect.width/2+(Math.random()-.5)*80)+'px';
    s.style.top =(rect.top +rect.height/2+(Math.random()-.5)*40)+'px';
    s.style.animationDelay=(Math.random()*.3)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1200);
  }
}

function setCharAnim(ids, cls){
  ids.forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.classList.remove('bounce','shake','cheer');
    void el.offsetWidth;
    if(cls!=='idle'){
      el.classList.add(cls);
      el.addEventListener('animationend',()=>el.classList.remove(cls),{once:true});
    }
  });
}

// ── Results ───────────────────────────────────────────────────────────────────
function showResults(){
  const total=state.questions.length;
  const pct=state.correct/total;

  document.getElementById('result-score').textContent = state.correct;
  document.getElementById('result-total').textContent = '/ '+total;

  let title,msg;
  if(pct>=0.9){
    title='🎉 すごい！はかせだ！';
    msg='ひらがな ぜんぶよめたね！ほんとうにすごい！';
    setCharAnim(['c-chiikawa-r','c-usagi-r'],'cheer');
  } else if(pct>=0.7){
    title='😊 よくできました！';
    msg='とってもじょうずだよ！もっとれんしゅうしてね！';
    setCharAnim(['c-chiikawa-r','c-usagi-r'],'bounce');
  } else if(pct>=0.5){
    title='💪 がんばったね！';
    msg='すこしずつおぼえていこう！もういちどやってみて！';
    setCharAnim(['c-chiikawa-r'],'idle');
  } else {
    title='📖 もういちどやってみよう！';
    msg='れんしゅうすればかならずよめるよ！いっしょにがんばろう！';
    setCharAnim(['c-chiikawa-r'],'shake');
  }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent   = msg;

  // まちがえたリスト
  const missDiv  = document.getElementById('miss-list');
  const missItems= document.getElementById('miss-items');
  if(state.missed.length>0){
    missDiv.style.display='';
    missItems.innerHTML = state.missed.map(q=>
      `<div class="miss-item">
        <span class="miss-h">${q.h}</span>
        <span class="miss-emoji">${q.emoji}</span>
        <div>
          <div class="miss-r">${q.r}</div>
          <div class="miss-w">${q.word}</div>
        </div>
      </div>`
    ).join('');
  } else {
    missDiv.style.display='none';
  }

  goTo('s-result');
}

// ── Sound ─────────────────────────────────────────────────────────────────────
let _actx;
function getACtx(){ if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function playCorrect(){
  try{
    const ctx=getACtx();
    [[660,0],[880,.18]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+d);
      g.gain.setValueAtTime(.35,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.45);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.5);
    });
  }catch(e){}
}
function playWrong(){
  try{
    const ctx=getACtx();
    [[180,0],[160,.22]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(f,ctx.currentTime+d);
      o.frequency.exponentialRampToValueAtTime(f*.7,ctx.currentTime+d+.2);
      g.gain.setValueAtTime(.3,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.22);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.25);
    });
  }catch(e){}
}

// ── Fullscreen ────────────────────────────────────────────────────────────────
function toggleFS(){
  const btn=document.getElementById('fs-btn');
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    btn.textContent='✕';
  } else {
    document.exitFullscreen();
    btn.textContent='⛶';
  }
}
document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('fs-btn');
  if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶';
});
